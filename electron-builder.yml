appId: com.terma.app
productName: Terma

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - node_modules/node-pty/**/*

asar: true
asarUnpack:
  - "node_modules/node-pty/**"

npmRebuild: false

extraResources:
  - from: assets/icon-256.png
    to: icon-256.png

linux:
  target:
    - target: deb
      arch: [x64]
  category: TerminalEmulator
  icon: build/icons
  desktop:
    entry:
      Name: Terma
      Comment: Modern terminal emulator
      Terminal: "false"
      Type: Application
      Categories: System;TerminalEmulator;
      StartupWMClass: terma
      Keywords: terminal;shell;console;

deb:
  priority: optional
  afterInstall: scripts/after-install.sh
