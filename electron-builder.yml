appId: com.terma.app
productName: Terma
copyright: "Copyright © 2025 Scott"
buildVersion: "1.0.0"

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - package.json
  - node_modules/node-pty/**/*

asar: true
asarUnpack:
  - "node_modules/node-pty/**"

npmRebuild: false

extraResources:
  - from: assets/icon-256.png
    to: icon-256.png
  - from: build/com.terma.app.metainfo.xml
    to: com.terma.app.metainfo.xml
  - from: build/terma.desktop
    to: terma.desktop

# ──────────────────────────────
#  Linux
# ──────────────────────────────
linux:
  target:
    - target: deb
      arch: [x64]
  executableName: terma
  category: TerminalEmulator
  synopsis: Modern terminal emulator with split panes, tabs and AI agent support
  description: |
    Terma is a modern terminal emulator built with Electron, React and xterm.js.
    Features include split panes with unlimited nesting, 6 pane types (terminal,
    file manager, AI agent, markdown viewer, image viewer, system monitor),
    multiple tabs with color coding, Git integration, SSH file browsing,
    voice input via Whisper, 4 built-in color themes, and session persistence.
  icon: build/icons
  maintainer: "Scott <scott@swlt.ru>"

deb:
  priority: optional
  depends:
    - libnotify4
    - libxtst6
    - libnss3
  afterInstall: scripts/after-install.sh
  afterRemove: scripts/after-remove.sh

# ──────────────────────────────
#  macOS
# ──────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  icon: build/icons/512x512.png
  darkModeSupport: true
  hardenedRuntime: true
  artifactName: "${name}-${version}-${os}-${arch}.${ext}"

dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ──────────────────────────────
#  Windows
# ──────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icons/icon.ico
  legalTrademarks: "Copyright © 2025 Scott"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Terma
  menuCategory: Development Tools
  installerIcon: build/icons/icon.ico
  uninstallerIcon: build/icons/icon.ico
  license: LICENSE
  artifactName: "${name}-${version}-setup.${ext}"
